services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resource_battle
      POSTGRES_USER: resource_battle
      POSTGRES_PASSWORD: resource_battle
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://resource_battle:resource_battle@db:5432/resource_battle?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db-data:

