<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resource Battle — Лидерборд</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div>
          <div class="kicker">Resource Battle</div>
          <h1 class="title">Лидерборд</h1>
        </div>
        <div class="header-right">
          <div class="logo-main">
            <img src="/static/main-logo.png" alt="Логотип" />
          </div>
          <div class="logo-partner">
            <img src="/media/partner-logo" alt="Логотип партнёра" class="partner-logo-img" />
          </div>
          <button class="btn" id="detailsToggle">Детали</button>
        </div>
      </header>

      <section class="card">
        <table class="table" aria-label="Лидерборд">
          <thead>
            <tr>
              <th class="col-place">Место</th>
              <th>Команда</th>
              <th class="col-points details-col">Баллы</th>
              <th class="details-col" style="width: 180px;">Выполнено задач</th>
            </tr>
          </thead>
          <tbody>
            {{range .Rows}}
            <tr>
              <td class="mono">{{.Place}}</td>
              <td>
                <div class="team-name">{{.TeamName}}</div>
              </td>
              <td class="mono details-col">{{.Points}}</td>
              <td class="mono details-col">{{.Tasks}}</td>
            </tr>
            {{end}}
          </tbody>
        </table>
      </section>

      <footer class="footer">
        <div class="muted">Обновляется при перезагрузке страницы.</div>
      </footer>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
